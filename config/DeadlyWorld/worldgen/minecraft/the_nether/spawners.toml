  #   "minecraft:magma_cube 10.0" ]
  #    Range for Values: ≥ 0.0
  dungeon_spawners.spawn_list = [
    "minecraft:wither_skeleton 200.0",
    "minecraft:husk 100.0",
    "minecraft:blaze 100.0",
    "minecraft:cave_spider 10.0",
    "minecraft:creeper 10.0",
    "minecraft:magma_cube 10.0"
  ]

  # The chance for dungeon spawners to generate as a mimic.
  # The mimic reveals itself when the spawner block is destroyed.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.05
  dungeon_spawners.mimic_chance = 0.05

  # Base attribute adjustments applied to entities spawned by dungeon spawners, if applicable.
