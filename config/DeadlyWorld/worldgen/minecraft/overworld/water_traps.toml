# Category: sea_mine_mob_water_traps
# Options to customize sea_mine_mob water traps specific to the 'overworld' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated
  #   sea_mine_mob water traps. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  sea_mine_mob_water_traps.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for sea_mine_mob water traps. A decimal represents a
  #   chance for a placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.3
  sea_mine_mob_water_traps.placements = 0.3

  # The minimum and maximum (inclusive) heights/y-values sea_mine_mob water traps can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: -54
  sea_mine_mob_water_traps.height.min = -54
  # <Integer> Range: Any Value, Default: 63
  sea_mine_mob_water_traps.height.max = 63

  # The chance for sea_mine_mob water traps to generate with camouflage.
  # Camouflage disguises the trap as a random nearby block.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.33
  sea_mine_mob_water_traps.camo_chance = 0.33
  # The chance for sea_mine_mob water traps to generate with a decoy above it.
  # Decoys range from fake cakes, illusionary mobs and other visual distractions that are not real.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.05
  sea_mine_mob_water_traps.decoy_chance = 0.05

  # These water traps are active as long as a player is within this distance (spherical distance).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 6.0
  sea_mine_mob_water_traps.required_player_range = 6.0
  # The chance for sea_mine_mob water traps to generate as requiring a sight check.
  # When the sight check is enabled, sea_mine_mob water traps will only activate when they have direct line-of-sight
  #   to a player within activation range. Their delays will continue to tick down, but they will wait to actually
  #   activate until they have line-of-sight.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 1.0
  sea_mine_mob_water_traps.sight_check_chance = 1.0

  # How many times the trap can trigger before it gets "used up".
  # Setting this to -1 equals infinite triggers.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: -1 ~ 32767, Default: 1
  sea_mine_mob_water_traps.triggers = 1
  # The minimum and maximum (inclusive) amount of time that must pass before a previously triggered trap resets, in
  #   ticks. (20 ticks = 1 second)
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 20
  sea_mine_mob_water_traps.reset_time.min = 20
  # <Integer> Range: 0 ~ 32767, Default: 60
  sea_mine_mob_water_traps.reset_time.max = 60

  # The number of placement attempts in surface water per chunk (16x16 blocks) for sea_mine_mob water traps. A decimal
  #   represents a chance for a placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.2
  sea_mine_mob_water_traps.placements_ocean = 0.2

  # Weighted list of mobs that can be spawned by sea_mine_mob water traps. One of these is chosen at random when the
  #   trap is generated.
  # Overriding this setting via data pack is NOT supported.
  # <Entity List> Format: [ "namespace:entity_type value", ... ], Default: [ "minecraft:drowned 100.0",
  #   "minecraft:squid 50.0" ]
  #    Range for Values: ≥ 0.0
  sea_mine_mob_water_traps.spawn_list = [
    "minecraft:drowned 100.0",
    "minecraft:squid 50.0"
  ]

  # The multiplier used when modifying the movement speed of the mobs spawned by this trap.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 1.5
  sea_mine_mob_water_traps.speed_multiplier = 1.5
  # The multiplier used when modifying the health of the mobs spawned by this trap.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 0.5
  sea_mine_mob_water_traps.health_multiplier = 0.5
