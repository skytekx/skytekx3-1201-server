# deadlyworld:worldgen/minecraft/overworld/water_traps.toml
# This config contains options for all water trap features specific to the 'overworld' dimension from 'minecraft'.

# This config also functions as the default settings for water trap features in any extra dimensions that do not have
#   world gen configs (all dimensions not included in the "general.extra_dimensions" list within the mod's main config
#   file, "_main").


# Category: normal_sea_mine_water_traps
# Options to customize normal_sea_mine water traps specific to the 'overworld' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated
  #   normal_sea_mine water traps. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  normal_sea_mine_water_traps.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for normal_sea_mine water traps. A decimal represents a
  #   chance for a placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.6
  normal_sea_mine_water_traps.placements = 0.6

  # The minimum and maximum (inclusive) heights/y-values normal_sea_mine water traps can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: -54
  normal_sea_mine_water_traps.height.min = -54
  # <Integer> Range: Any Value, Default: 63
  normal_sea_mine_water_traps.height.max = 63

  # The number of placement attempts in surface water per chunk (16x16 blocks) for normal_sea_mine water traps. A
  #   decimal represents a chance for a placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.3
  normal_sea_mine_water_traps.placements_ocean = 0.3

  # How far up from the ocean floor in blocks the mine will be placed, with a trail of chains underneath it.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: ≥ 0, Default: 2
  normal_sea_mine_water_traps.dist_from_bottom.min = 2
  # <Integer> Range: ≥ 0, Default: 8
  normal_sea_mine_water_traps.dist_from_bottom.max = 8

  # The explosion power of this mine block.
  # For reference, vanilla creepers = 3.0 and vanilla TNT = 4.0.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 6.0
  normal_sea_mine_water_traps.explosion_power = 6.0

  # A list of potions that may be applied to creatures caught in this mine's blast.
  # Overriding this setting via data pack is NOT supported.
  # <Registry Entry-value List> Format: [ "namespace:registry_name value1 value2 value3", ... ], Default: []
  #    Target registry: ResourceKey[minecraft:root / minecraft:mob_effect]
  #    Range for Values: ≥ 0.0
  normal_sea_mine_water_traps.potions = []


