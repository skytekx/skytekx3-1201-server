# deadlyworld:worldgen/minecraft/the_nether/chests.toml
# This config contains options for all chest features specific to the 'the_nether' dimension from 'minecraft'.


# Category: simple_chests
# Options to customize simple chests specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated simple
  #   chests. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  simple_chests.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for simple chests. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.15
  simple_chests.placements = 0.15

  # The minimum and maximum (inclusive) heights/y-values simple chests can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  simple_chests.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  simple_chests.height.max = 120


