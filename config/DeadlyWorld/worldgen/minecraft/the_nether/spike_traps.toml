# deadlyworld:worldgen/minecraft/the_nether/spike_traps.toml
# This config contains options for all spike trap features specific to the 'the_nether' dimension from 'minecraft'.


# Category: mundane_spike_traps
# Options to customize mundane spike traps specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated mundane
  #   spike traps. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  mundane_spike_traps.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for mundane spike traps. A decimal represents a chance
  #   for a placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.0
  mundane_spike_traps.placements = 0.0

  # The minimum and maximum (inclusive) heights/y-values mundane spike traps can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  mundane_spike_traps.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  mundane_spike_traps.height.max = 120

  # The amount of placement tries when placing a spike trap block in a spike trap patch.
  # Not to be confused with the 'placements' field above.
  # <Integer> Range: ≥ 1, Default: 25
  mundane_spike_traps.placement_tries = 25
  # How far on the X and Z axis placements can be offset in a spike trap patch.
  # <Integer> Range: 1 ~ 15, Default: 5
  mundane_spike_traps.spread.vertical = 5
  # How far on the Y axis placements can be offset in a spike trap patch.
  # <Integer> Range: 0 ~ 10, Default: 2
  mundane_spike_traps.spread.horizontal = 2

  # The amount of damage this spike trap deals to players standing on it
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 3.0
  mundane_spike_traps.damage = 3.0


