  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  mini_dungeons.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for mini dungeons. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 1.0
  mini_dungeons.placements = 1.0

  # The minimum and maximum (inclusive) heights/y-values mini dungeons can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  mini_dungeons.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  mini_dungeons.height.max = 120

  # The chance for floor and wall blocks to be infested with silverfish. The chance is rolled for each block
  #   individually, and the block must be a valid host (see the "infested_blocks" config).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.15
  mini_dungeons.infested_chance = 0.15
