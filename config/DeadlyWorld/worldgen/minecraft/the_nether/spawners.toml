# Category: dungeon_spawners
# Options to customize dungeon spawners specific to the 'the_nether' dimension from 'minecraft'.


  # These spawners are active as long as a player is within this distance (spherical distance).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 16
  dungeon_spawners.required_player_range = 16
  # The chance for dungeon spawners to generate as requiring a sight check.
  # When the sight check is enabled, dungeon spawners will only activate when they have direct line-of-sight to a
  #   player within activation range. Their delays will continue to tick down, but they will wait to actually activate
  #   until they have line-of-sight.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.0
  dungeon_spawners.sight_check_chance = 0.0
  # Will not spawn if this many or more similar entities are in close proximity. Specifically, it checks a cube that
  #   extends out by the spawn range in all six directions. Set this to 0 to allow spawns regardless of nearby entities.
  # For reference, vanilla spawners have a max of 6 nearby entities.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 8
  dungeon_spawners.max_nearby_entities = 8

  # The minimum and maximum (inclusive) delay between spawn batches, in ticks. (20 ticks = 1 second)
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 200
  dungeon_spawners.delay.min = 200
  # <Integer> Range: 0 ~ 32767, Default: 800
  dungeon_spawners.delay.max = 800
  # Each spawn batch increases the spawner's delay buildup by this many ticks (±10%). Set this to 0 to revert to the
  #   vanilla spawner behavior (simple random between min and max delays).
  # See above for a more in-depth description of progressive spawn delay.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 40
  dungeon_spawners.delay.progression = 40
  # The rate at which the spawn delay buildup on spawners recovers while no players are within range.
  # Inactive spawners' delays are reduced by this value each tick (20 times per second).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.1
  dungeon_spawners.delay.recovery_rate = 0.1

  # The total number of mobs that can be spawned by this type of spawner. Spawners permanently deactivate when they
  #   run out of spawns. Set this to 0 for unlimited spawns (the normal behavior).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 0
  dungeon_spawners.max_spawns = 0
  # The number of mobs to try spawning with each spawn batch. May spawn fewer depending on nearby obstructions.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 4
  dungeon_spawners.spawn_count = 4
  # The maximum horizontal range to spawn mobs in.
