  # Dynamic potion towers pick a new potion every time they shoot a tipped arrow.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.2
  potion_towers.dynamic_chance = 0.2
