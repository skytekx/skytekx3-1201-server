# deadlyworld:worldgen/minecraft/the_nether/spawners.toml
# This config contains options for all spawner features specific to the 'the_nether' dimension from 'minecraft'.

  # Entity List fields: General format = [ "namespace:entity_type value1 value2 ...", ... ]
  #   Entity lists are arrays of entity types. Some entity lists specify a number of values linked to each entity type.
  #   Entity types are defined by their key in the entity registry, usually following the pattern
  #     'namespace:entity_name'.
  #   'default' can be used instead of an entity type registry key to provide default values for all entities.
  #   List entries by default match any entity type derived from (i.e. based on) their entity type. For example,
  #     '~minecraft:zombie'.
  #     There is no steadfast rule about extending, even in vanilla, but the hope is that mod-added mobs will extend
  #       their base mob.
  #   An asterisk '*' can be used to match all registry entries belonging to X namespace. For example, 'minecraft:*'
  #     will match all vanilla entries.
  #   Entity type tags can also be used here. To declare a tag, start with a '#' followed by the rest of the tag path.
  #   Tag example: '#minecraft:beehive_inhabitors'
  #       Priority order: specific entries > tag entries > namespace entries > default

  # Progressive Spawn Delay:
  #   * By default, spawners added by this mod use a mechanic called 'progressive spawn delay'. Unlike vanilla
  #     spawners that have a completely random delay chosen anywhere from 10 to 40 seconds (what awful variance!),
  #     Deadly World spawners will start from a 10 second delay and slowly increase up to 40 seconds delay as you
  #     continue to stand close to them (with the same vanilla delay limits of 200-800 ticks).
  #   * A spawner's 'delay buildup' starts at its minimum delay and increases by its delay progression (±10%) with
  #     each successful spawn, up to its maximum delay.
  #   * While no players are within the spawner's activation range, its 'delay buildup' is continuously decreased by
  #     its delay recovery, back down to its minimum delay.
  #   * The delay, delay progression, and delay recovery for each spawner type are determined by either these configs
  #     or the 'configured_feature' json file when generated or placed and can then be overwritten for individual
  #     spawners by nbt editing.


# Category: simple_spawners
# Options to customize simple spawners specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated simple
  #   spawners. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  simple_spawners.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for simple spawners. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.3
  simple_spawners.placements = 0.3

  # The minimum and maximum (inclusive) heights/y-values simple spawners can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  simple_spawners.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  simple_spawners.height.max = 120

  # These spawners are active as long as a player is within this distance (spherical distance).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 16
  simple_spawners.required_player_range = 16
  # The chance for simple spawners to generate as requiring a sight check.
  # When the sight check is enabled, simple spawners will only activate when they have direct line-of-sight to a
  #   player within activation range. Their delays will continue to tick down, but they will wait to actually activate
  #   until they have line-of-sight.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.0
  simple_spawners.sight_check_chance = 0.0
  # Will not spawn if this many or more similar entities are in close proximity. Specifically, it checks a cube that
  #   extends out by the spawn range in all six directions. Set this to 0 to allow spawns regardless of nearby entities.
  # For reference, vanilla spawners have a max of 6 nearby entities.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 8
  simple_spawners.max_nearby_entities = 8

  # The minimum and maximum (inclusive) delay between spawn batches, in ticks. (20 ticks = 1 second)
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 200
  simple_spawners.delay.min = 200
  # <Integer> Range: 0 ~ 32767, Default: 800
  simple_spawners.delay.max = 800
  # Each spawn batch increases the spawner's delay buildup by this many ticks (±10%). Set this to 0 to revert to the
  #   vanilla spawner behavior (simple random between min and max delays).
  # See above for a more in-depth description of progressive spawn delay.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 40
  simple_spawners.delay.progression = 40
  # The rate at which the spawn delay buildup on spawners recovers while no players are within range.
  # Inactive spawners' delays are reduced by this value each tick (20 times per second).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.1
  simple_spawners.delay.recovery_rate = 0.1

  # The total number of mobs that can be spawned by this type of spawner. Spawners permanently deactivate when they
  #   run out of spawns. Set this to 0 for unlimited spawns (the normal behavior).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 0
  simple_spawners.max_spawns = 0
  # The number of mobs to try spawning with each spawn batch. May spawn fewer depending on nearby obstructions.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 4
  simple_spawners.spawn_count = 4
  # The maximum horizontal range to spawn mobs in.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 4
  simple_spawners.spawn_range = 4

  # The chance for simple spawners to generate as 'dynamic'.
  # Dynamic spawners pick a new mob to spawn after each spawn.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.1
  simple_spawners.dynamic_chance = 0.1
  # Weighted list of mobs that can be spawned by simple spawners. One of these is chosen at random when the spawner is
  #   generated.
  # Spawners generated as 'dynamic' pick again after each spawn.
  # Overriding this setting via data pack is NOT currently supported.
  # <Entity List> Format: [ "namespace:entity_type value", ... ], Default: [ "minecraft:wither_skeleton 200.0",
  #   "minecraft:husk 100.0", "minecraft:blaze 100.0", "minecraft:cave_spider 10.0", "minecraft:creeper 10.0",
  #   "minecraft:magma_cube 10.0" ]
  #    Range for Values: ≥ 0.0
  simple_spawners.spawn_list = [
    "minecraft:wither_skeleton 200.0",
    "minecraft:husk 100.0",
    "minecraft:blaze 100.0",
    "minecraft:cave_spider 10.0",
    "minecraft:creeper 10.0",
    "minecraft:magma_cube 10.0"
  ]

  # The chance for simple spawners to generate as a mimic.
  # The mimic reveals itself when the spawner block is destroyed.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.05
  simple_spawners.mimic_chance = 0.05

  # Base attribute adjustments applied to entities spawned by simple spawners, if applicable.
  # Overriding this setting via data pack is NOT currently supported.
  # <Attribute List> Format: [ "namespace:attribute_name operation value", ... ], Default: []
  #    Range for Values: Any Value
  simple_spawners.attribute_adjustments = []


