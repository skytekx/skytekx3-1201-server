# deadlyworld:worldgen/minecraft/the_nether/floor_traps.toml
# This config contains options for all floor trap features specific to the 'the_nether' dimension from 'minecraft'.

  # Entity List fields: General format = [ "namespace:entity_type value1 value2 ...", ... ]
  #   Entity lists are arrays of entity types. Some entity lists specify a number of values linked to each entity type.
  #   Entity types are defined by their key in the entity registry, usually following the pattern
  #     'namespace:entity_name'.
  #   'default' can be used instead of an entity type registry key to provide default values for all entities.
  #   List entries by default match any entity type derived from (i.e. based on) their entity type. For example,
  #     '~minecraft:zombie'.
  #     There is no steadfast rule about extending, even in vanilla, but the hope is that mod-added mobs will extend
  #       their base mob.
  #   An asterisk '*' can be used to match all registry entries belonging to X namespace. For example, 'minecraft:*'
  #     will match all vanilla entries.
  #   Entity type tags can also be used here. To declare a tag, start with a '#' followed by the rest of the tag path.
  #   Tag example: '#minecraft:beehive_inhabitors'
  #       Priority order: specific entries > tag entries > namespace entries > default


# Category: tnt_floor_traps
# Options to customize tnt floor traps specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated tnt
  #   floor traps. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  tnt_floor_traps.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for tnt floor traps. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.15
  tnt_floor_traps.placements = 0.15

  # The minimum and maximum (inclusive) heights/y-values tnt floor traps can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  tnt_floor_traps.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  tnt_floor_traps.height.max = 120

  # The chance for tnt floor traps to generate with camouflage.
  # Camouflage disguises the trap as a random nearby block.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.66
  tnt_floor_traps.camo_chance = 0.66
  # The chance for tnt floor traps to generate with a decoy above it.
  # Decoys range from fake cakes, illusionary mobs and other visual distractions that are not real.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 0.05
  tnt_floor_traps.decoy_chance = 0.05

  # These floor traps are active as long as a player is within this distance (spherical distance).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 4.0
  tnt_floor_traps.required_player_range = 4.0
  # The chance for tnt floor traps to generate as requiring a sight check.
  # When the sight check is enabled, tnt floor traps will only activate when they have direct line-of-sight to a
  #   player within activation range. Their delays will continue to tick down, but they will wait to actually activate
  #   until they have line-of-sight.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 1.0
  tnt_floor_traps.sight_check_chance = 1.0

  # How many times the trap can trigger before it gets "used up".
  # Setting this to -1 equals infinite triggers.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: -1 ~ 32767, Default: 1
  tnt_floor_traps.triggers = 1
  # The minimum and maximum (inclusive) amount of time that must pass before a previously triggered trap resets, in
  #   ticks. (20 ticks = 1 second)
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 20
  tnt_floor_traps.reset_time.min = 20
  # <Integer> Range: 0 ~ 32767, Default: 60
  tnt_floor_traps.reset_time.max = 60

  # The minimum and maximum (inclusive) fuse time set on TNT spawned by this trap, in ticks. (20 ticks = 1 second)
  # <Integer> Range: 0 ~ 32767, Default: 40
  tnt_floor_traps.fuse_time.min = 40
  # <Integer> Range: 0 ~ 32767, Default: 50
  tnt_floor_traps.fuse_time.max = 50

  # The amount of TNT spawned when this trap is activated.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 1, Default: 4
  tnt_floor_traps.tnt_count = 4
  # The velocity at which the spawned TNT gets launched when this trap activates.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 2.0
  tnt_floor_traps.launch_speed = 2.0


