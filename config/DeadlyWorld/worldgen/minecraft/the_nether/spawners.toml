  #    Range for Values: Any Value
  dungeon_spawners.attribute_adjustments = []

  # If true, the type of monster to spawn is picked from Forge's internal weighted list of entity types that can spawn
  #   in monster rooms/simple dungeons.
  # If the spawner is 'dynamic' and picks a new type of monster to spawn every time it spawns, a new type will be
  #   picked from the weighted Forge list instead of this spawner's spawn list config.
  # This setting takes priority over this spawner's spawn list config.
