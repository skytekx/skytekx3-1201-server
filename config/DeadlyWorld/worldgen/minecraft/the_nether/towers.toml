  #   chosen at random when the tower is generated.
  # Towers generated as 'dynamic' pick again for each shot.
  # Overriding this setting via data pack is NOT supported.
  # <Registry Entry-value List> Format: [ "namespace:registry_name value1 value2 value3", ... ], Default: [
  #   "minecraft:wither 5.0 100.0 0.0", "minecraft:slowness 30.0 200.0 2.0", "minecraft:poison 20.0 100.0 1.0",
  #   "minecraft:blindness 10.0 200.0 0.0" ]
  #    Target registry: ResourceKey[minecraft:root / minecraft:mob_effect]
  #    Range for Values: ≥ 0.0
  potion_towers.potion_list = [
    "minecraft:wither 5.0 100.0 0.0",
    "minecraft:slowness 30.0 200.0 2.0",
    "minecraft:poison 20.0 100.0 1.0",
    "minecraft:blindness 10.0 200.0 0.0"
  ]


