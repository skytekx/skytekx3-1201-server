# deadlyworld:block_auto_gen.toml
# This config contains options for DeadlyWorld's auto-generated blocks (e.g. infested blocks and unstable blocks).


# Category: general
# General settings for all auto-generated blocks created and registered by DeadlyWorld.

  # By default (that is, when this list is empty), Deadly World will attempt to adjust load order such that it loads
  #   its blocks after all namespaces used in the "host_blocks" list and any blocks with a namespace that not equal to a
  #   loaded mod's id will be skipped.
  # If you enter any ids in this list, instead Deadly World will attempt to adjust load order after only the mods on
  #   this list and will not skip any blocks on the above list.
  # All load order adjustment is disabled if you only enter "minecraft" (or non-existent mods) in this list, if you
  #   prefer to just crash instead of mucking with load order mid-loading.
  #  * Requires a GAME restart to take effect *
  # <mod_id List> Format: [ "mod_id1", "mod_id2", ... ], Default: []
  general.block_auto_gen.dependencies = []
