  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 0.2
  infested_chests.silverfish.launch_speed = 0.2


# Category: surprise_chests
# Options to customize surprise chests specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated surprise
  #   chests. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  surprise_chests.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for surprise chests. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.075
  surprise_chests.placements = 0.075

  # The minimum and maximum (inclusive) heights/y-values surprise chests can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  surprise_chests.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  surprise_chests.height.max = 120

  # The chance for surprise chests to spawn primed TNT when triggered.
  # This setting can be overridden by 'configured_feature' and/or 'loot_tables' files in data packs.
  # <Integer> Range: ≥ 0, Default: 10
  surprise_chests.weight.tnt = 10
  # The chance for surprise chests to overflow with lava when triggered.
  # This setting can be overridden by 'configured_feature' and/or 'loot_tables' files in data packs.
  # <Integer> Range: ≥ 0, Default: 5
  surprise_chests.weight.lava = 5
  # The chance for surprise chests to overflow with runny lava when triggered.
  # This setting can be overridden by 'configured_feature' and/or 'loot_tables' files in data packs.
  # <Integer> Range: ≥ 0, Default: 2
  surprise_chests.weight.runny_lava = 2
  # The chance for surprise chests to release an expanding poison cloud when triggered.
  # This setting can be overridden by 'configured_feature' and/or 'loot_tables' files in data packs.
  # <Integer> Range: ≥ 0, Default: 5
  surprise_chests.weight.poison_gas = 5
  # The chance for surprise chests to release an expanding wither cloud when triggered.
  # This setting can be overridden by 'configured_feature' and/or 'loot_tables' files in data packs.
  # <Integer> Range: ≥ 0, Default: 1
  surprise_chests.weight.wither_gas = 1

  # The delay before spawned TNT explodes, in ticks. (20 ticks = 1 second).
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 40
  surprise_chests.tnt.fuse_time.min = 40
  # <Integer> Range: ≥ 0, Default: 60
  surprise_chests.tnt.fuse_time.max = 60
  # The number of TNT spawned when a TNT-rigged container is opened.
  # Note that setting this higher than 1 will pretty much guarantee everything in the container gets exploded.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 1
  surprise_chests.tnt.count = 1
  # The maximum horizontal speed spawned TNT are launched at.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.0, Default: 0.05
  surprise_chests.tnt.launch_speed = 0.05

  # The delay before the poison gas cloud starts spreading, in ticks. (20 ticks = 1 second)
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 20
  surprise_chests.poison_gas.delay = 20
  # The duration (after its initial delay) until the poison gas cloud reaches max size and disappears, in ticks.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 40
  surprise_chests.poison_gas.duration = 40
  # The maximum distance, in blocks, the poison gas cloud spreads from its origin.
  # Note the cloud starts at 0.5 radius and linearly increases to max radius at exactly its max duration.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.5, Default: 12.0
  surprise_chests.poison_gas.max_radius = 12.0
  # Potency of the poison effect applied by poison gas clouds. (0 = Poison I, 1 = Poison II, etc.)
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 0
  surprise_chests.poison_gas.effect.potency = 0
  # Duration of the poison effect applied by poison gas clouds, in ticks.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 200
  surprise_chests.poison_gas.effect.duration = 200

  # The delay before the withering gas cloud starts spreading, in ticks. (20 ticks = 1 second)
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 20
  surprise_chests.wither_gas.delay = 20
  # The duration (after its initial delay) until the withering gas cloud reaches max size and disappears, in ticks.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 40
  surprise_chests.wither_gas.duration = 40
  # The maximum distance, in blocks, the withering gas cloud spreads from its origin.
  # Note the cloud starts at 0.5 radius and linearly increases to max radius at exactly its max duration.
  # Overriding this setting via data pack is NOT supported.
  # <Number> Range: ≥ 0.5, Default: 12.0
  surprise_chests.wither_gas.max_radius = 12.0
  # Potency of the wither effect applied by withering gas clouds. (0 = Wither I, 1 = Wither II, etc.)
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 0
  surprise_chests.wither_gas.effect.potency = 0
  # Duration of the wither effect applied by withering gas clouds, in ticks.
  # Overriding this setting via data pack is NOT supported.
  # <Integer> Range: ≥ 0, Default: 200
  surprise_chests.wither_gas.effect.duration = 200
