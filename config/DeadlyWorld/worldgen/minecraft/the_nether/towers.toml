# deadlyworld:worldgen/minecraft/the_nether/towers.toml
# This config contains options for all tower features specific to the 'the_nether' dimension from 'minecraft'.


# Category: simple_towers
# Options to customize simple towers specific to the 'the_nether' dimension from 'minecraft'.

  # When set to true, places a 1x1 column of glass to the height limit from a few blocks above each generated simple
  #   towers. This is game-breaking and laggy. Also prints a message to the console.
  # Consider using a tool to strip away all stone/dirt/etc. or xray via spectator mode after world gen for more
  #   intensive testing.
  # Overriding this setting via data pack is NOT supported.
  # <Boolean> Valid Values: { true, false }, Default: false
  simple_towers.testing_markers = false

  # The number of placement attempts per chunk (16x16 blocks) for simple towers. A decimal represents a chance for a
  #   placement attempt (e.g., 0.3 means 30% chance for one attempt).
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.2
  simple_towers.placements = 0.2

  # The minimum and maximum (inclusive) heights/y-values simple towers can generate at.
  # This setting can be overridden for world gen by 'placed_feature' files in data packs.
  # <Integer> Range: Any Value, Default: 32
  simple_towers.height.min = 32
  # <Integer> Range: Any Value, Default: 120
  simple_towers.height.max = 120

  # These towers are active as long as a player is within this distance (spherical distance).
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 11.0
  simple_towers.required_player_range = 11.0
  # The chance for simple towers to generate as requiring a sight check.
  # When the sight check is enabled, simple towers will only activate when they have direct line-of-sight to a player
  #   within activation range. Their delays will continue to tick down, but they will wait to actually activate until
  #   they have line-of-sight.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: 0.0 ~ 1.0, Default: 1.0
  simple_towers.sight_check_chance = 1.0

  # The minimum and maximum (inclusive) delay between attacks, in ticks. (20 ticks = 1 second)
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Integer> Range: 0 ~ 32767, Default: 20
  simple_towers.attack_delay.min = 20
  # <Integer> Range: 0 ~ 32767, Default: 40
  simple_towers.attack_delay.max = 40
  # The base damage of attacks from simple towers.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 3.0
  simple_towers.attack_damage = 3.0

  # The base speed of projectiles fired by simple towers.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 1.2
  simple_towers.projectile_speed = 1.2
  # The inaccuracy of projectiles fired by simple towers.
  # This setting can be overridden for world gen by 'configured_feature' files in data packs.
  # <Number> Range: ≥ 0.0, Default: 0.08
  simple_towers.projectile_variance = 0.08


